<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="3600">
<title>Activated Insights · Sales Floor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f0e8;font-family:system-ui,-apple-system,sans-serif;margin:0;overflow:hidden}
#wrap{background:#f5f0e8;color:#291e3b;height:100vh;display:flex;flex-direction:column}
.topbar{background:#291e3b;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #f0b429;flex-shrink:0}
.brand{display:flex;align-items:center;gap:14px}
.brand-divider{width:1px;height:22px;background:#4a3a5c}
.sales-label{font-size:12px;color:#a89bc0;letter-spacing:0.1em;text-transform:uppercase}
.slide-counter{font-size:12px;color:#a89bc0;background:#3d2d55;padding:4px 12px;border-radius:20px}
.ndots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:400px;justify-content:flex-end}
.ndot{width:7px;height:7px;border-radius:50%;background:#4a3a5c;cursor:pointer;transition:background 0.2s}
.ndot.on{background:#f0b429}
.updated{font-size:10px;color:#4a3a5c;margin-left:4px}
.progress-bar{height:3px;background:#e8e0d4;flex-shrink:0}
.progress-fill{height:3px;background:#f0b429;transition:width 0.1s linear}
.content{flex:1;overflow:hidden;position:relative}
.slide{display:none;padding:22px 28px;flex-direction:column;gap:14px;height:100%;position:absolute;top:0;left:0;right:0;bottom:0}
.slide.on{display:flex}
.tags{display:flex;gap:8px;margin-bottom:2px}
.tag{font-size:13px;font-weight:700;padding:5px 15px;border-radius:20px;text-transform:uppercase;letter-spacing:0.07em}
.tag-ae{background:#291e3b;color:#fff}
.tag-bdr{background:#e8e0d4;color:#291e3b}
.tag-mtd{background:#f0b429;color:#291e3b}
.tag-sl{background:#6b3fa0;color:#fff}
.tag-hbc{background:#291e3b;color:#f0b429}
.tag-team{background:#f0b429;color:#291e3b}
.headline{font-size:28px;font-weight:700;color:#291e3b;line-height:1.2}
.subline{font-size:12px;color:#9a8fa8;margin-top:3px}
.podium{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:4px}
.pcard{background:#fff;border-radius:12px;border:1.5px solid #e8e0d4;padding:20px 16px;text-align:center;box-shadow:0 1px 4px rgba(41,30,59,0.07);display:flex;flex-direction:column;align-items:center}
.pcard.p1{border-color:#f0b429;background:#fffbf0;box-shadow:0 3px 12px rgba(240,180,41,0.18)}
.medal{font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;display:inline-block;margin-bottom:12px}
.m1{background:#f0b429;color:#291e3b}.m2{background:#e8e0d4;color:#291e3b}.m3{background:#ede8f5;color:#6b3fa0}
.av{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;margin:0 auto 10px;border:2px solid #e8e0d4}
.av-sl{background:#ede8f5;color:#6b3fa0}.av-hbc{background:#291e3b;color:#f0b429}.av-ent{background:#f0ebe0;color:#291e3b}
.av-bdr-sl{background:#ede8f5;color:#6b3fa0}.av-bdr-hbc{background:#291e3b;color:#f0b429}.av-bdr-ent{background:#f0ebe0;color:#291e3b}
.pname{font-size:16px;font-weight:600;color:#291e3b;margin-bottom:2px}
.pteam{font-size:10px;color:#9a8fa8;margin-bottom:12px}
.pval{font-size:30px;font-weight:700;color:#291e3b;line-height:1}
.punit{font-size:11px;color:#9a8fa8;margin-top:4px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
.tcard{background:#fff;border-radius:12px;border:1.5px solid #e8e0d4;padding:14px 18px;box-shadow:0 1px 4px rgba(41,30,59,0.07)}
.tcard.lead{border-color:#f0b429;background:#fffbf0}
.thead{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e8e0d4}
.tdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tmgr{font-size:14px;font-weight:600;color:#291e3b}.tsub{font-size:9px;color:#9a8fa8}
.tbadge{margin-left:auto;font-size:9px;padding:2px 8px;border-radius:20px;background:#f0b429;color:#291e3b;font-weight:700}
.tstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.tstat-l{font-size:8px;color:#9a8fa8;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:2px}
.tstat-v{font-size:16px;font-weight:700;color:#291e3b}
.treps{border-top:1px solid #e8e0d4;padding-top:8px}
.trep{display:flex;justify-content:space-between;padding:3px 0}
.trep-n{font-size:11px;color:#9a8fa8}.trep-v{font-size:11px;font-weight:600;color:#291e3b}
.botbar{padding:10px 28px;display:flex;align-items:center;gap:10px;background:#291e3b;border-top:2px solid #3d2d55;flex-shrink:0}
.btn{font-size:12px;color:#a89bc0;background:#3d2d55;border:1px solid #4a3a5c;border-radius:8px;padding:6px 14px;cursor:pointer}
.btn:hover{color:#fff;background:#4a3a5c}
.btn.hi{color:#291e3b;background:#f0b429;border-color:#f0b429;font-weight:600}
</style>
</head>
<body>
<div id="wrap">
  <div class="topbar">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28">
        <path d="M9 19 L13 14 L7 16 Z" fill="#7c4dba"/>
        <path d="M5 14 L12 13 L6 10 Z" fill="#7c4dba"/>
        <path d="M7 9 L12 12 L10 6 Z" fill="#7c4dba"/>
        <path d="M12 6 L13 13 L18 8 Z" fill="#f0b429"/>
        <path d="M18 7 L14 13 L20 12 Z" fill="#f0b429"/>
        <path d="M20 13 L14 14 L19 18 Z" fill="#f0b429"/>
        <path d="M17 19 L13 14 L12 20 Z" fill="#f0b429"/>
      </svg>
      <span style="font-size:15px;font-weight:700;color:#fff;letter-spacing:0.01em">Activated Insights</span>
      <div class="brand-divider"></div>
      <span class="sales-label">Sales Floor · MTD</span>
      <span class="updated">Updated May 18, 2026</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="slide-counter" id="counter">1 / 10</span>
      <div class="ndots" id="ndots"></div>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>
  <div class="content" id="content"></div>
  <div class="botbar">
    <button class="btn" onclick="prev()">← prev</button>
    <button class="btn hi" id="pbtn" onclick="togglePause()">pause</button>
    <button class="btn" onclick="next()">next →</button>
  </div>
</div>
<script>
const MGRS={
  'Walpole':{label:'Michael Walpole',sub:'Senior Living',color:'#6b3fa0',reps:['Cait Lee','Gannon Sedlak','Shelley Daenzer','Josh Gayne','Jasmine Wieliczko','Colby Williams','Grace Grady','Drew Garside','Logan Hurd','Julia Carr','Caden Lowrance','Julia Blackwell']},
  'Caleb':{label:'Caleb Hendricks',sub:'Home-Based Care',color:'#291e3b',reps:['Bennet Bleil','Caden Noble','Chris Pacis','Dan Arzhanov','Ethan Hatch','Kyler Coles','Nicholas Reis','Tony Humphreys']},
  'Darin':{label:'Darin Ellsworth',sub:'Home-Based Care',color:'#f0b429',reps:['Brett Keys','Connor Hollman','Daniel Bonilla','Jaxson Hellbusch','Kaleb Polk','Riley Pettegrew','Tanner Schill']},
  'Deana':{label:'Deana Ferguson',sub:'Home-Based Care',color:'#9c6dd0',reps:['Clayton Jensen','Del Jenkins','Jessica Downing','Luke DeMarcus','Mechell Howard','Trevon Hymer']},
  'Alex':{label:'Alexandra Kreighbaum',sub:'Enterprise',color:'#c8a84b',reps:['Matthew Winkler','Laurie Kaiser','Lucas Brandt']}
};
const TL={'sl':'Senior Living','hbc':'Home-Based Care','ent':'Enterprise','bdr-sl':'BDR · SL','bdr-hbc':'BDR · HBC','bdr-ent':'BDR · Enterprise'};

const AE=[
  {name:'Travis Barton',team:'hbc',calls:489,msched:29,acv:2900},
  {name:'Ethan Hatch',team:'hbc',calls:488,msched:13,acv:6500},
  {name:'Nicholas Reis',team:'hbc',calls:481,msched:19,acv:27000},
  {name:'Riley Pettegrew',team:'hbc',calls:462,msched:19,acv:6000},
  {name:'Jaxson Hellbusch',team:'hbc',calls:453,msched:28,acv:8700},
  {name:'Jordan Bailey',team:'hbc',calls:424,msched:22,acv:2300},
  {name:'Logan Hurd',team:'sl',calls:365,msched:8,acv:0},
  {name:'Tony Humphreys',team:'hbc',calls:365,msched:21,acv:11000},
  {name:'Brett Keys',team:'hbc',calls:337,msched:13,acv:9900},
  {name:'Caden Noble',team:'hbc',calls:333,msched:30,acv:6900},
  {name:'Daniel Bonilla',team:'hbc',calls:329,msched:11,acv:5900},
  {name:'Jasmine Wieliczko',team:'sl',calls:329,msched:9,acv:0},
  {name:'Kaleb Polk',team:'hbc',calls:295,msched:6,acv:4600},
  {name:'Tanner Schill',team:'hbc',calls:284,msched:7,acv:8200},
  {name:'Grace Grady',team:'sl',calls:281,msched:14,acv:2800},
  {name:'Julia Blackwell',team:'sl',calls:279,msched:9,acv:3100},
  {name:'Bennet Bleil',team:'hbc',calls:251,msched:3,acv:31000},
  {name:'Chris Pacis',team:'hbc',calls:248,msched:11,acv:7000},
  {name:'Cait Lee',team:'sl',calls:230,msched:3,acv:11000},
  {name:'Gannon Sedlak',team:'sl',calls:218,msched:8,acv:3700},
  {name:'Drew Garside',team:'sl',calls:217,msched:13,acv:27000},
  {name:'Caden Lowrance',team:'sl',calls:175,msched:11,acv:0},
  {name:'Connor Hollman',team:'hbc',calls:147,msched:5,acv:7000},
  {name:'Kyler Coles',team:'hbc',calls:133,msched:1,acv:8000},
  {name:'Colby Williams',team:'sl',calls:105,msched:1,acv:4800},
  {name:'Shelley Daenzer',team:'sl',calls:96,msched:2,acv:6100},
  {name:'Dan Arzhanov',team:'hbc',calls:21,msched:0,acv:2200},
  {name:'Mechell Howard',team:'hbc',calls:0,msched:0,acv:27000},
  {name:'Clayton Jensen',team:'hbc',calls:0,msched:0,acv:6600},
  {name:'Del Jenkins',team:'hbc',calls:0,msched:0,acv:16000},
  {name:'Jessica Downing',team:'hbc',calls:0,msched:0,acv:8200},
  {name:'Luke DeMarcus',team:'hbc',calls:0,msched:0,acv:4100},
  {name:'Trevon Hymer',team:'hbc',calls:0,msched:0,acv:0},
  {name:'Laurie Kaiser',team:'ent',calls:0,msched:0,acv:3000},
  {name:'Lucas Brandt',team:'ent',calls:0,msched:0,acv:259000},
];

const BDR=[
  {name:'Alice Borg',team:'bdr-hbc',calls:680,msched:22,qsos:14,sourced:6200},
  {name:'Ty Konold',team:'bdr-hbc',calls:676,msched:27,qsos:9,sourced:2900},
  {name:'Kayla Keaveny',team:'bdr-sl',calls:641,msched:9,qsos:3,sourced:0},
  {name:'Ben Durgin',team:'bdr-hbc',calls:574,msched:13,qsos:11,sourced:20000},
  {name:'Jack Satterthwaite',team:'bdr-ent',calls:540,msched:5,qsos:0,sourced:0},
  {name:'Elliot Bryant',team:'bdr-sl',calls:423,msched:2,qsos:1,sourced:0},
  {name:'Robin Call',team:'bdr-sl',calls:107,msched:2,qsos:0,sourced:0},
];

function ini(n){return n.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase()}
function avc(t){if(t==='sl')return'av-sl';if(t==='hbc')return'av-hbc';if(t==='ent')return'av-ent';if(t==='bdr-sl')return'av-bdr-sl';if(t==='bdr-hbc')return'av-bdr-hbc';return'av-bdr-ent'}
function fn(v){return Math.round(v||0).toLocaleString()}
function fa(v){return(!v||v===0)?'—':'$'+Math.round(v).toLocaleString()}

function top3(arr,key,filter){
  let d=filter?arr.filter(r=>r.team===filter):arr;
  return d.filter(r=>(r[key]||0)>0).sort((a,b)=>(b[key]||0)-(a[key]||0)).slice(0,3);
}

function podHTML(reps,vFn,unit){
  if(!reps.length)return'<p style="color:#9a8fa8;font-size:14px;padding:20px 0">No data for this category</p>';
  return'<div class="podium">'+['1st','2nd','3rd'].slice(0,reps.length).map((pl,i)=>`
    <div class="pcard${i===0?' p1':''}">
      <span class="medal m${i+1}">${pl}</span>
      <div class="av ${avc(reps[i].team)}">${ini(reps[i].name)}</div>
      <div class="pname">${reps[i].name}</div>
      <div class="pteam">${TL[reps[i].team]||reps[i].team}</div>
      <div class="pval">${vFn(reps[i])}</div>
      ${unit?`<div class="punit">${unit}</div>`:''}
    </div>`).join('')+'</div>';
}

function teamHTML(){
  const stats=Object.values(MGRS).map(m=>{
    const reps=m.reps.map(n=>AE.find(d=>d.name===n)||{name:n,calls:0,msched:0,acv:0});
    return{...m,calls:reps.reduce((s,r)=>s+(r.calls||0),0),msched:reps.reduce((s,r)=>s+(r.msched||0),0),acv:reps.reduce((s,r)=>s+(r.acv||0),0),reps};
  }).sort((a,b)=>b.acv-a.acv);
  return'<div class="tgrid">'+stats.map((m,i)=>`
    <div class="tcard${i===0?' lead':''}">
      <div class="thead">
        <div class="tdot" style="background:${m.color}"></div>
        <div><div class="tmgr">${m.label}</div><div class="tsub">${m.sub}</div></div>
        ${i===0?'<span class="tbadge">leading</span>':''}
      </div>
      <div class="tstats">
        <div><div class="tstat-l">ACV MTD</div><div class="tstat-v" style="font-size:13px">${fa(m.acv)}</div></div>
        <div><div class="tstat-l">Calls</div><div class="tstat-v">${fn(m.calls)}</div></div>
        <div><div class="tstat-l">Meetings</div><div class="tstat-v">${fn(m.msched)}</div></div>
      </div>
      <div class="treps">${[...m.reps].sort((a,b)=>(b.acv||0)-(a.acv||0)).slice(0,4).map(r=>`
        <div class="trep"><span class="trep-n">${r.name}</span><span class="trep-v">${(r.acv||0)>0?fa(r.acv):'—'}</span></div>`).join('')}
      </div>
    </div>`).join('')+'</div>';
}

const SLIDES=[
  {tags:['tag-ae','tag-mtd'],t:['AE','Month to Date'],h:'Top caller',sub:'Account executives · outbound calls MTD',fn:()=>podHTML(top3(AE,'calls'),r=>fn(r.calls),'calls')},
  {tags:['tag-ae','tag-mtd'],t:['AE','Month to Date'],h:'Top meeting booked',sub:'Account executives · meetings scheduled MTD',fn:()=>podHTML(top3(AE,'msched'),r=>fn(r.msched),'meetings')},
  {tags:['tag-ae','tag-mtd'],t:['AE','Month to Date'],h:'Top closed ACV',sub:'Account executives · closed won MTD',fn:()=>podHTML(top3(AE,'acv'),r=>fa(r.acv),'')},
  {tags:['tag-sl','tag-mtd'],t:['Senior Living','Month to Date'],h:'Top Senior Living AEs',sub:'Closed ACV this month',fn:()=>podHTML(top3(AE,'acv','sl'),r=>fa(r.acv),'')},
  {tags:['tag-hbc','tag-mtd'],t:['Home-Based Care','Month to Date'],h:'Top Home-Based Care AEs',sub:'Closed ACV this month',fn:()=>podHTML(top3(AE,'acv','hbc'),r=>fa(r.acv),'')},
  {type:'team'},
  {tags:['tag-bdr','tag-mtd'],t:['BDR','Month to Date'],h:'Top caller',sub:'BDRs · outbound calls MTD',fn:()=>podHTML(top3(BDR,'calls'),r=>fn(r.calls),'calls')},
  {tags:['tag-bdr','tag-mtd'],t:['BDR','Month to Date'],h:'Top meeting booked',sub:'BDRs · meetings scheduled MTD',fn:()=>podHTML(top3(BDR,'msched'),r=>fn(r.msched),'meetings')},
  {tags:['tag-bdr','tag-mtd'],t:['BDR','Month to Date'],h:'Top QSOs',sub:'BDRs · qualified sales opportunities MTD',fn:()=>podHTML(top3(BDR,'qsos'),r=>fn(r.qsos),'QSOs')},
  {tags:['tag-bdr','tag-mtd'],t:['BDR','Month to Date'],h:'Top deals sourced',sub:'BDRs · sourced closed ACV MTD',fn:()=>podHTML(top3(BDR,'sourced'),r=>fa(r.sourced),'')},
];

function slideHTML(s){
  if(s.type==='team')return`
    <div class="tags"><span class="tag tag-team">Team Totals</span><span class="tag tag-mtd">Month to Date</span></div>
    <div class="headline">Team performance</div>
    <div class="subline">All AE teams · closed ACV + activity this month</div>
    ${teamHTML()}`;
  return`
    <div class="tags">${s.tags.map((t,i)=>`<span class="tag ${t}">${s.t[i]}</span>`).join('')}</div>
    <div class="headline">${s.h}</div>
    <div class="subline">${s.sub}</div>
    ${s.fn()}`;
}

let cur=0,paused=false,pval=0,ptick;
const DUR=7000;

function render(){
  document.getElementById('content').innerHTML=SLIDES.map((s,i)=>`<div class="slide${i===0?' on':''}" id="s${i}">${slideHTML(s)}</div>`).join('');
  document.getElementById('ndots').innerHTML=SLIDES.map((_,i)=>`<div class="ndot${i===cur?' on':''}" onclick="go(${i})"></div>`).join('');
  document.getElementById('counter').textContent=`${cur+1} / ${SLIDES.length}`;
}
function show(i){
  document.querySelectorAll('.slide').forEach((el,j)=>el.classList.toggle('on',j===i));
  document.querySelectorAll('.ndot').forEach((el,j)=>el.classList.toggle('on',j===i));
  document.getElementById('counter').textContent=`${i+1} / ${SLIDES.length}`;
}
function go(i){cur=i;show(i);pval=0;document.getElementById('pfill').style.width='0%'}
function next(){cur=(cur+1)%SLIDES.length;show(cur);pval=0;document.getElementById('pfill').style.width='0%'}
function prev(){cur=(cur-1+SLIDES.length)%SLIDES.length;show(cur);pval=0;document.getElementById('pfill').style.width='0%'}
function tick(){
  clearInterval(ptick);if(paused)return;
  ptick=setInterval(()=>{
    pval+=100;
    document.getElementById('pfill').style.width=Math.min(pval/DUR*100,100)+'%';
    if(pval>=DUR){pval=0;next()}
  },100);
}
function togglePause(){
  paused=!paused;
  const b=document.getElementById('pbtn');
  b.textContent=paused?'resume':'pause';
  b.classList.toggle('hi',!paused);
  paused?clearInterval(ptick):tick();
}
render();tick();
</script>
</body>
</html>
